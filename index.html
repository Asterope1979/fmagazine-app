<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Foolish Magazine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#e8c26a;--bg:#111;--sur:#1c1c1c;--card:#222;
  --brd:#2e2e2e;--t1:#f0f0f0;--t2:#aaaaaa;--t3:#555;
}
html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative}

/* ── TOPBAR ── */
.topbar{background:#0d0d0d;padding:13px 14px 11px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid var(--brd)}
.logo{font-family:Georgia,serif;font-size:18px;color:#fff;letter-spacing:.02em;flex:1;text-align:center}
.logo span{color:var(--gold)}
.ibtn{background:none;border:none;cursor:pointer;color:#666;padding:8px;border-radius:6px;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ibtn:active{background:#2a2a2a;color:#fff}

/* ── SCROLL ── */
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── CARD LISTA (nuovo layout orizzontale con testo) ── */
.card{display:flex;gap:12px;padding:13px 15px;border-bottom:1px solid var(--brd);cursor:pointer;align-items:flex-start}
.card:active{background:var(--sur)}
.thumb{width:90px;height:72px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#2a2a2a}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-yt{width:90px;height:72px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#000;position:relative}
.thumb-yt img{width:100%;height:100%;object-fit:cover;display:block;opacity:.85}
.thumb-yt .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.thumb-yt .play div{width:24px;height:24px;background:rgba(255,0,0,.9);border-radius:50%;display:flex;align-items:center;justify-content:center}
.thumb-yt .play div:after{content:'';display:block;width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid #fff;margin-left:2px}
.thumb-icon{width:90px;height:72px;border-radius:6px;background:#2a2a2a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px}
.cb{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.clbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);font-weight:700}
.ctit{font-size:14px;font-weight:500;line-height:1.4;color:var(--t1);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.csnip{font-size:12px;color:var(--t3);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:1px}
.cmet{font-size:11px;color:var(--t3);margin-top:2px}

/* ── ETICHETTA "Ultimo pubblicato" ── */
.latest-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-weight:700;padding:12px 15px 6px;border-bottom:1px solid var(--brd)}

/* ── SEPARATORI ── */
.sechd{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-weight:700;padding:11px 15px 7px;border-bottom:1px solid var(--brd)}
.mdiv{padding:8px 15px 5px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:700;border-bottom:1px solid var(--brd)}

/* ── ARTICLE VIEW ── */
#article-view{display:none;flex-direction:column;position:fixed;inset:0;z-index:200;background:var(--bg)}
#article-view.open{display:flex}
.art-topbar{background:#0d0d0d;padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid var(--brd)}
.bkbtn{background:none;border:none;cursor:pointer;color:#777;font-size:24px;padding:2px;line-height:1;display:flex;align-items:center}
.bkbtn:active{color:#fff}
.art-nav-title{flex:1;font-size:13px;color:#999;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.art-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.art-hero-img{width:100%;max-height:240px;object-fit:cover;display:block}
.art-body{padding:18px 17px 60px}
.albl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-weight:700;margin-bottom:9px}
.atit{font-family:Georgia,serif;font-size:23px;font-weight:normal;line-height:1.3;margin-bottom:9px}
.amet{font-size:12px;color:var(--t3);margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--brd)}
.acnt{font-size:15px;line-height:1.8;color:var(--t2)}
.acnt p{margin-bottom:14px}
.acnt img{max-width:100%;width:100%;border-radius:8px;margin:12px 0;display:block;height:auto}
.acnt a{color:var(--gold);text-decoration:none}
.acnt h2{font-family:Georgia,serif;font-size:19px;font-weight:normal;color:var(--t1);margin:20px 0 9px}
.acnt h3{font-family:Georgia,serif;font-size:16px;font-weight:normal;color:var(--t1);margin:16px 0 7px}
.acnt blockquote{border-left:3px solid var(--gold);margin:14px 0;padding:7px 0 7px 14px;color:#888;font-style:italic}
.web-btn{margin:24px 0 0;padding:13px;background:none;border:1px solid var(--brd);border-radius:8px;color:var(--t2);cursor:pointer;font-size:14px;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:7px}
.web-btn:active{background:var(--sur)}

/* ── DRAWER (menu laterale) ── */
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300}
#drawer-overlay.open{display:block}
#drawer{position:fixed;top:0;left:0;width:78vw;max-width:300px;height:100%;background:#0f0f0f;z-index:301;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;border-right:1px solid var(--brd)}
#drawer.open{transform:translateX(0)}
.drawer-head{padding:22px 18px 14px;border-bottom:1px solid var(--brd);flex-shrink:0}
.drawer-logo{font-family:Georgia,serif;font-size:20px;color:#fff}
.drawer-logo span{color:var(--gold)}
.drawer-sub{font-size:11px;color:var(--t3);margin-top:4px}
.drawer-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:24px}
.drawer-section{padding:14px 18px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-weight:700;border-bottom:1px solid var(--brd)}
.drawer-item{display:flex;align-items:center;gap:11px;padding:12px 18px;cursor:pointer;border-bottom:1px solid #1a1a1a;font-size:14px;color:var(--t2)}
.drawer-item:active{background:var(--sur)}
.drawer-item.active{color:var(--gold);font-weight:600}
.drawer-item .di-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.drawer-footer{padding:16px 18px;border-top:1px solid var(--brd);flex-shrink:0}
.drawer-footer a{font-size:12px;color:var(--t3);text-decoration:none}

/* ── STATI ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:14px;color:var(--t3);font-size:14px}
.spinner{width:30px;height:30px;border:2px solid #333;border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-wrap{padding:40px 22px;text-align:center;color:var(--t3);font-size:14px;line-height:1.7}
.retry-btn{margin-top:16px;padding:10px 22px;background:none;border:1px solid var(--brd);border-radius:20px;color:var(--t2);font-family:inherit;font-size:14px;cursor:pointer;display:inline-block}
.retry-btn:active{background:var(--sur)}
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <button class="ibtn" onclick="openDrawer()" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="2" y1="5" x2="18" y2="5"/><line x1="2" y1="10" x2="18" y2="10"/><line x1="2" y1="15" x2="18" y2="15"/>
      </svg>
    </button>
    <div class="logo">Foolish <span>Magazine</span></div>
    <button class="ibtn" onclick="refreshFeed()" aria-label="Aggiorna">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 2v5h-5"/><path d="M3 10a7 7 0 0 1 11.9-5l2.1 2"/><path d="M3 18v-5h5"/><path d="M17 10a7 7 0 0 1-11.9 5L3 13"/>
      </svg>
    </button>
  </div>

  <!-- FEED -->
  <div id="scroll-area">
    <div id="feed">
      <div class="loading-wrap"><div class="spinner"></div><span>Caricamento articoli...</span></div>
    </div>
  </div>

  <!-- ARTICLE VIEW -->
  <div id="article-view">
    <div class="art-topbar">
      <button class="bkbtn" onclick="closeArticle()" aria-label="Indietro">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 5l-6 6 6 6"/>
        </svg>
      </button>
      <span class="art-nav-title" id="art-nav-title">Foolish Magazine</span>
      <button class="ibtn" onclick="openCurrentInBrowser()" aria-label="Apri nel browser" style="color:#555">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 3h5v5"/><path d="M15 3L8 10"/><path d="M7 4H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-4"/>
        </svg>
      </button>
    </div>
    <div class="art-scroll" id="art-scroll">
      <div id="art-content"></div>
    </div>
  </div>

  <!-- DRAWER OVERLAY -->
  <div id="drawer-overlay" onclick="closeDrawer()"></div>

  <!-- DRAWER -->
  <div id="drawer">
    <div class="drawer-head">
      <div class="drawer-logo">Foolish <span>Magazine</span></div>
      <div class="drawer-sub">Il blog delle passioni colte</div>
    </div>
    <div class="drawer-scroll" id="drawer-scroll">
      <!-- popolato da JS -->
    </div>
    <div class="drawer-footer">
      <a href="https://www.foolishmagazine.com" onclick="openUrl('https://www.foolishmagazine.com');return false;">
        &#x2197; Visita il sito web
      </a>
    </div>
  </div>

</div>

<script>
// ── STATO ────────────────────────────────────────────────
var allPosts      = [];
var currentUrl    = '';
var activeFilter  = { type: 'all', value: null };   // {type:'all'|'tag'|'year', value}
var _jsonpScript  = null;
var _jsonpTimer   = null;

// ── JSONP LOADER ─────────────────────────────────────────
function loadFeed() {
  document.getElementById('feed').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div><span>Caricamento articoli...</span></div>';
  if (_jsonpScript && _jsonpScript.parentNode) { _jsonpScript.parentNode.removeChild(_jsonpScript); }
  if (_jsonpTimer) clearTimeout(_jsonpTimer);

  window._fmCb = function(data) {
    if (_jsonpTimer) { clearTimeout(_jsonpTimer); _jsonpTimer = null; }
    try {
      var entries = (data.feed && data.feed.entry) || [];
      allPosts = entries;
      buildDrawer();
      applyFilter();
    } catch(e) { showError(); }
  };

  _jsonpTimer = setTimeout(showError, 14000);
  _jsonpScript = document.createElement('script');
  _jsonpScript.src = 'https://www.foolishmagazine.com/feeds/posts/default?alt=json&max-results=500&callback=_fmCb';
  _jsonpScript.onerror = function() { clearTimeout(_jsonpTimer); showError(); };
  document.head.appendChild(_jsonpScript);
}

function showError() {
  document.getElementById('feed').innerHTML =
    '<div class="error-wrap">Impossibile caricare gli articoli.<br>Controlla la connessione internet.'
    + '<br><br><button class="retry-btn" onclick="refreshFeed()">&#x27F3; Riprova</button>'
    + '<br><br><small><a href="https://www.foolishmagazine.com" style="color:var(--gold);" '
    + 'onclick="openUrl(\'https://www.foolishmagazine.com\');return false;">foolishmagazine.com</a></small></div>';
}

function refreshFeed() { allPosts = []; loadFeed(); }

// ── UTILITIES ─────────────────────────────────────────────
function formatDate(str) {
  try { return new Date(str).toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'}); }
  catch(e) { return ''; }
}
function getYear(str) {
  try { return new Date(str).getFullYear(); } catch(e) { return ''; }
}
function extractYoutubeId(html) {
  var m = (html||'').match(/(?:youtube\.com\/embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function extractImg(html) {
  var m = (html||'').match(/<img[^>]+src=["']([^"']+)["']/);
  if (m) return m[1];
  var ytId = extractYoutubeId(html||'');
  return ytId ? 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg' : null;
}
function isYtOnly(html) {
  // vero se NON ci sono img ma c'è un iframe YouTube
  var hasImg = /<img[^>]+src=["'][^"']+["']/i.test(html||'');
  return !hasImg && !!extractYoutubeId(html||'');
}
function stripHtml(html) {
  return (html||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
}
function getLabel(post) {
  var cats = post.category;
  if (!cats || !cats.length) return 'Articolo';
  var t = (Array.isArray(cats) ? cats[0].term : cats.term) || '';
  return t.replace(/Showcase \(|\)/g,'') || 'Articolo';
}
function getUrl(post) {
  var links = post.link || [];
  for (var i=0; i<links.length; i++) if (links[i].rel==='alternate') return links[i].href;
  return 'https://www.foolishmagazine.com';
}
function safeAttr(s) {
  return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r?\n/g,' ');
}
function openUrl(url) { window.open(url,'_blank'); }

// ── FILTRO ───────────────────────────────────────────────
function applyFilter() {
  var f = activeFilter;
  var list = allPosts.filter(function(p) {
    if (f.type === 'tag') {
      return (p.category||[]).some(function(c){ return c.term === f.value; });
    }
    if (f.type === 'year') {
      return getYear(p.published.$t) == f.value;
    }
    return true;
  });
  renderFeed(list);
  document.getElementById('scroll-area').scrollTop = 0;
}

// ── DRAWER ───────────────────────────────────────────────
function buildDrawer() {
  // Raccogli tag e anni
  var tagMap = {}, years = {};
  allPosts.forEach(function(p) {
    (p.category||[]).forEach(function(c){ var t=(c.term||'').trim(); if(t) tagMap[t]=(tagMap[t]||0)+1; });
    var y = getYear(p.published.$t); if(y) years[y]=(years[y]||0)+1;
  });
  var tags = Object.keys(tagMap).sort(function(a,b){ return tagMap[b]-tagMap[a]; });
  var yrs  = Object.keys(years).sort(function(a,b){ return b-a; });

  var h = '';

  // Voce "Tutti"
  h += '<div class="drawer-item' + (activeFilter.type==='all'?' active':'') + '" onclick="setFilter(\'all\',null)">'
     + '<span class="di-icon">&#9776;</span> Tutti gli articoli</div>';

  // Sezione TAG
  h += '<div class="drawer-section">Categorie</div>';
  tags.forEach(function(t) {
    var isAct = activeFilter.type==='tag' && activeFilter.value===t;
    h += '<div class="drawer-item' + (isAct?' active':'') + '" onclick="setFilter(\'tag\',\'' + safeAttr(t) + '\')">'
       + '<span class="di-icon">&#x25C6;</span> ' + t + ' <span style="margin-left:auto;font-size:11px;color:var(--t3);">' + tagMap[t] + '</span></div>';
  });

  // Sezione ANNI
  h += '<div class="drawer-section">Archivio per anno</div>';
  yrs.forEach(function(y) {
    var isAct = activeFilter.type==='year' && activeFilter.value==y;
    h += '<div class="drawer-item' + (isAct?' active':'') + '" onclick="setFilter(\'year\',' + y + ')">'
       + '<span class="di-icon">&#x1F4C5;</span> ' + y + ' <span style="margin-left:auto;font-size:11px;color:var(--t3);">' + years[y] + '</span></div>';
  });

  document.getElementById('drawer-scroll').innerHTML = h;
}

function setFilter(type, value) {
  activeFilter = { type: type, value: value };
  closeDrawer();
  buildDrawer();
  applyFilter();
}

function openDrawer()  { document.getElementById('drawer').classList.add('open'); document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }

// ── RENDER FEED ──────────────────────────────────────────
function renderFeed(posts) {
  var feed = document.getElementById('feed');
  if (!posts.length) {
    feed.innerHTML = '<div class="error-wrap">Nessun articolo trovato per questo filtro.</div>';
    return;
  }

  var h = '';
  var lastMonth = '';

  posts.forEach(function(post, idx) {
    var rawContent = post.content.$t || '';
    var img        = extractImg(rawContent);
    var ytOnly     = isYtOnly(rawContent);
    var lbl        = getLabel(post);
    var date       = formatDate(post.published.$t);
    var url        = getUrl(post);
    var title      = post.title.$t || '';
    var snip       = stripHtml(rawContent).slice(0, 90);

    // Primo articolo: etichetta "Ultimo pubblicato" + card normale
    if (idx === 0) {
      h += '<div class="latest-label">&#x2605; Ultimo pubblicato</div>';
    } else {
      // Separatore mese per gli altri
      try {
        var mo = new Date(post.published.$t).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
        if (mo !== lastMonth) { h += '<div class="mdiv">' + mo + '</div>'; lastMonth = mo; }
      } catch(e) {}
    }

    // Card
    h += '<div class="card" onclick="openArticle(\'' + safeAttr(url) + '\',\'' + safeAttr(title) + '\',\'' + safeAttr(lbl) + '\',\'' + safeAttr(img||'') + '\',\'' + safeAttr(date) + '\')">';

    // Thumbnail
    if (img && ytOnly) {
      h += '<div class="thumb-yt"><img src="' + img + '" alt="" loading="lazy" onerror="this.parentElement.style.background=\'#2a2a2a\'">'
         + '<div class="play"><div></div></div></div>';
    } else if (img) {
      h += '<div class="thumb"><img src="' + img + '" alt="" loading="lazy" onerror="this.parentElement.className=\'thumb-icon\';this.parentElement.innerHTML=\'&#9998;\'"></div>';
    } else {
      h += '<div class="thumb-icon">&#9998;</div>';
    }

    // Testo
    h += '<div class="cb">'
       + '<div class="clbl">' + lbl + '</div>'
       + '<div class="ctit">' + title + '</div>'
       + (snip ? '<div class="csnip">' + snip + '</div>' : '')
       + '<div class="cmet">' + date + '</div>'
       + '</div></div>';
  });

  feed.innerHTML = h;
}

// ── ARTICOLO ─────────────────────────────────────────────
function openArticle(url, title, lbl, img, date) {
  currentUrl = url;
  document.getElementById('art-nav-title').textContent = title;

  var post    = allPosts.find(function(p){ return getUrl(p) === url; });
  var content = post ? (post.content.$t || '') : '';

  // Rimuovi script
  content = content.replace(/<script[\s\S]*?<\/script>/gi, '');

  // Gestisci iframe: YouTube → card tap-to-play; altri → rimuovi
  content = content.replace(/<iframe([^>]*)>[\s\S]*?<\/iframe>/gi, function(match, attrs) {
    if (/youtube\.com|youtu\.be/i.test(attrs)) {
      var idM = attrs.match(/(?:youtube\.com\/embed\/|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      var ytId = idM ? idM[1] : null;
      if (!ytId) return '';
      var thumb  = 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
      var ytUrl  = 'https://www.youtube.com/watch?v=' + ytId;
      return '<div onclick="openUrl(\'' + ytUrl + '\')" style="position:relative;border-radius:8px;margin:14px 0;overflow:hidden;cursor:pointer;background:#000;">'
        + '<img src="' + thumb + '" style="width:100%;display:block;opacity:.85;" alt="Video">'
        + '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">'
        + '<div style="width:60px;height:60px;background:rgba(255,0,0,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;">'
        + '<div style="width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:22px solid #fff;margin-left:5px;"></div>'
        + '</div></div>'
        + '<div style="position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:12px;color:#fff;">&#x25B6; Guarda su YouTube</div>'
        + '</div>';
    }
    return '';
  });

  var h = '';
  if (img) h += '<img class="art-hero-img" src="' + img + '" alt="" onerror="this.style.display=\'none\'">';
  h += '<div class="art-body">'
     + '<div class="albl">' + lbl + '</div>'
     + '<div class="atit">' + title + '</div>'
     + '<div class="amet">' + date + ' &middot; Foolish Magazine</div>'
     + '<div class="acnt">' + content + '</div>'
     + '<button class="web-btn" onclick="openCurrentInBrowser()">&#x2197;&ensp;Leggi sul sito web</button>'
     + '</div>';

  document.getElementById('art-content').innerHTML = h;
  document.getElementById('art-scroll').scrollTop = 0;
  document.getElementById('article-view').classList.add('open');
}

function closeArticle()       { document.getElementById('article-view').classList.remove('open'); }
function openCurrentInBrowser(){ if (currentUrl) openUrl(currentUrl); }

// ── BACK ANDROID ─────────────────────────────────────────
document.addEventListener('backbutton', function(e) {
  if (document.getElementById('drawer').classList.contains('open')) { e.preventDefault(); closeDrawer(); return; }
  if (document.getElementById('article-view').classList.contains('open')) { e.preventDefault(); closeArticle(); }
}, false);
history.pushState({p:'list'},'');
window.addEventListener('popstate', function() {
  if (document.getElementById('drawer').classList.contains('open')) { closeDrawer(); return; }
  if (document.getElementById('article-view').classList.contains('open')) { closeArticle(); }
});

// ── AVVIO ─────────────────────────────────────────────────
loadFeed();
</script>
